name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install -r backend/requirements-dev.txt
      - name: Byte-compile backend
        run: python -m py_compile $(git ls-files 'backend/**/*.py')
      - name: Run tests
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        # Non-blocking for now: the repo carries pre-existing lint debt. Surfaces
        # issues without failing CI; flip to blocking after a lint-cleanup pass.
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build
